services:
  - type: web
    name: amazon-ai-listing-tool
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node --no-warnings server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@sivigliart.it
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
