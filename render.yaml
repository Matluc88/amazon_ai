services:
  - type: web
    name: amazon-ai-listing-tool
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node --no-warnings server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@sivigliart.it
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_SERVICE_ACCOUNT_KEY_B64
        sync: false
      - key: GA4_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: MATOMO_URL
        sync: false
      - key: MATOMO_AUTH_TOKEN
        sync: false
      - key: MATOMO_SITE_ID
        sync: false
      - key: MERCHANT_ACCOUNT_ID
        sync: false
      - key: MERCHANT_SERVICE_ACCOUNT_KEY_B64
        sync: false

  - type: cron
    name: amazon-ai-metrics-sync
    runtime: node
    plan: free
    schedule: "0 4 * * *"
    buildCommand: npm install
    startCommand: node scripts/sync-metrics.js 7
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_SERVICE_ACCOUNT_KEY_B64
        sync: false
      - key: GA4_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: MATOMO_URL
        sync: false
      - key: MATOMO_AUTH_TOKEN
        sync: false
      - key: MATOMO_SITE_ID
        sync: false
      - key: MERCHANT_ACCOUNT_ID
        sync: false
      - key: MERCHANT_SERVICE_ACCOUNT_KEY_B64
        sync: false
